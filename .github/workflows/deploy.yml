name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Placeholder
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run backend tests before deploy
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew test

      - name: Deploy placeholder
        run: |
          echo "No deployment target is configured yet."
          echo "Replace this step when the production deployment target is decided."

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS_TEXT="success"
          else
            STATUS_TEXT="failure"
          fi

          python - <<'PY' > slack-payload.json
          import json
          import os

          run_url = (
              f"{os.environ['GITHUB_SERVER_URL']}/"
              f"{os.environ['GITHUB_REPOSITORY']}/actions/runs/"
              f"{os.environ['GITHUB_RUN_ID']}"
          )
          text = (
              f"Deploy Actions {os.environ['STATUS_TEXT']}\n"
              f"- Branch: {os.environ['GITHUB_REF_NAME']}\n"
              f"- Commit: {os.environ['GITHUB_SHA']}\n"
              f"- Workflow: {os.environ['GITHUB_WORKFLOW']}\n"
              f"- Run: {run_url}"
          )
          print(json.dumps({"text": text}, ensure_ascii=False))
          PY

          curl -X POST -H 'Content-type: application/json' \
            --data @slack-payload.json \
            "$SLACK_WEBHOOK_URL"
