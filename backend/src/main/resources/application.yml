spring:
  application:
    name: reserveflow
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reserveflow}
    username: ${DB_USERNAME:reserveflow}
    password: ${DB_PASSWORD:reserveflow}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3s}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

reserveflow:

  llm:
    base-url: ${LLM_SERVICE_BASE_URL:http://localhost:8000}
    timeout: ${LLM_SERVICE_TIMEOUT:10s}
    rate-limit:
      max-requests: ${LLM_INTERPRET_RATE_LIMIT_MAX_REQUESTS:10}
      window: ${LLM_INTERPRET_RATE_LIMIT_WINDOW:1m}

  jwt:
    issuer: ${JWT_ISSUER:reserveflow}
    secret: ${JWT_SECRET:reserveflow-local-development-secret-key-change-me}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:7d}
