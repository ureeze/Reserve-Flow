spring:
  application:
    name: reserveflow
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reserveflow}
    username: ${DB_USERNAME:reserveflow}
    password: ${DB_PASSWORD:reserveflow}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3s}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
