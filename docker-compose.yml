services:
  postgres:
    image: postgres:17-alpine
    container_name: reserveflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reserveflow}
      POSTGRES_USER: ${POSTGRES_USER:-reserveflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reserveflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - reserveflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2-alpine
    container_name: reserveflow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - reserveflow-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  reserveflow-postgres-data:
  reserveflow-redis-data:
