services:
  postgres:
    image: postgres:18.4
    container_name: reserveflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reserveflow}
      POSTGRES_USER: ${POSTGRES_USER:-reserveflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reserveflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - reserveflow-postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2-alpine
    container_name: reserveflow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - reserveflow-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  llm-service:
    build:
      context: ./llm-service
    container_name: reserveflow-llm-service
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      LLM_SERVICE_HOST: 0.0.0.0
      LLM_SERVICE_PORT: 8000
    ports:
      - "${LLM_SERVICE_PORT:-8000}:8000"

volumes:
  reserveflow-postgres18-data:
  reserveflow-redis-data:
